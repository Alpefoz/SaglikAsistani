spring.application.name=saglikasistani

# Uretim (Railway): DB_URL, DB_USERNAME, DB_PASSWORD, GROQ_API_KEY ortam degiskenleri
# Yerel: mvn spring-boot:run -> local profili -> application-local.properties
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.sql.init.mode=always
spring.test.database.replace=none

spring.jpa.defer-datasource-initialization=true

groq.api.key=${GROQ_API_KEY}
groq.model=meta-llama/llama-4-scout-17b-16e-instruct

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB